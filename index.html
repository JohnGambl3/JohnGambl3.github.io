<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dodgeball Tournament</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #E8321A; --red-dark: #B52410; --red-dim: rgba(232,50,26,0.12);
    --yellow: #F5C842; --yellow-dim: rgba(245,200,66,0.1);
    --bg: #0E0E0E; --surface: #181818; --surface2: #222222;
    --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.18);
    --text: #F0EDE8; --text-muted: rgba(240,237,232,0.45); --text-dim: rgba(240,237,232,0.25);
    --green: #3ECF6A; --green-dim: rgba(62,207,106,0.12);
    --blue: #5BA4F5; --blue-dim: rgba(91,164,245,0.1);
    --font-display: 'Bebas Neue', sans-serif; --font-body: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; padding: 2rem 1.5rem 4rem; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.025; pointer-events: none; z-index: 0;
  }
  .wrap { max-width: 900px; margin: 0 auto; position: relative; z-index: 1; }

  header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 2.5rem; border-bottom: 1px solid var(--border-strong); padding-bottom: 1.25rem; }
  .logo-block h1 { font-family: var(--font-display); font-size: clamp(42px, 8vw, 72px); line-height: 0.9; letter-spacing: 0.02em; }
  .logo-block h1 span { color: var(--red); }
  .logo-block p { font-size: 13px; color: var(--text-muted); margin-top: 6px; letter-spacing: 0.05em; text-transform: uppercase; }
  .stats-bar { display: flex; gap: 1.5rem; align-items: flex-end; }
  .stat { text-align: right; }
  .stat-val { font-family: var(--font-display); font-size: 32px; line-height: 1; color: var(--yellow); }
  .stat-lbl { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }

  /* Setup */
  .setup-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; }
  .setup-panel h2 { font-family: var(--font-display); font-size: 22px; letter-spacing: 0.05em; margin-bottom: 0.25rem; }
  .setup-section-label { font-size: 11px; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; margin: 1.25rem 0 0.6rem; }
  .team-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-bottom: 0.5rem; }
  .team-input-row { display: flex; align-items: center; gap: 8px; }
  .team-num { font-family: var(--font-display); font-size: 18px; color: var(--red); min-width: 24px; }
  input[type="text"], input[type="number"] {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-family: var(--font-body); font-size: 14px; padding: 8px 12px;
    width: 100%; outline: none; transition: border-color 0.15s;
  }
  input[type="text"]:focus, input[type="number"]:focus { border-color: var(--red); }
  input[type="text"]::placeholder, input[type="number"]::placeholder { color: var(--text-dim); }
  input[type="number"] { -moz-appearance: textfield; width: 80px; }
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

  .timer-setup-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .timer-setup-row label { font-size: 13px; color: var(--text-muted); }
  .timer-presets { display: flex; gap: 6px; flex-wrap: wrap; }
  .preset-btn {
    font-size: 12px; padding: 5px 10px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text-muted); cursor: pointer; font-family: var(--font-body);
    transition: all 0.12s;
  }
  .preset-btn:hover { border-color: var(--border-strong); color: var(--text); }
  .preset-btn.active { background: var(--red-dim); border-color: var(--red); color: var(--red); }

  .btn-start {
    font-family: var(--font-display); font-size: 20px; letter-spacing: 0.08em;
    background: var(--red); color: #fff; border: none; border-radius: 8px;
    padding: 10px 28px; cursor: pointer; transition: background 0.15s, transform 0.1s; margin-top: 1.25rem;
  }
  .btn-start:hover { background: var(--red-dark); }
  .btn-start:active { transform: scale(0.98); }
  .btn-reset { font-family: var(--font-body); font-size: 13px; background: transparent; color: var(--text-muted); border: 1px solid var(--border); border-radius: 6px; padding: 6px 14px; cursor: pointer; transition: border-color 0.15s, color 0.15s; }
  .btn-reset:hover { border-color: var(--border-strong); color: var(--text); }

  /* ── TIMER ── */
  .timer-panel {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 1.25rem 1.5rem; margin-bottom: 1.5rem; display: flex;
    align-items: center; gap: 1.5rem; flex-wrap: wrap;
  }
  .timer-display {
    font-family: var(--font-display); font-size: clamp(48px, 10vw, 80px);
    letter-spacing: 0.04em; line-height: 1; min-width: 200px;
    transition: color 0.3s;
  }
  .timer-display.running { color: var(--green); }
  .timer-display.warning { color: var(--yellow); }
  .timer-display.expired { color: var(--red); animation: pulse 0.6s ease infinite alternate; }
  @keyframes pulse { from { opacity: 1; } to { opacity: 0.4; } }

  .timer-controls { display: flex; flex-direction: column; gap: 8px; }
  .timer-btn-row { display: flex; gap: 8px; }
  .timer-btn {
    font-family: var(--font-display); font-size: 16px; letter-spacing: 0.06em;
    padding: 8px 18px; border-radius: 8px; border: none; cursor: pointer;
    transition: background 0.12s, transform 0.1s;
  }
  .timer-btn:active { transform: scale(0.97); }
  .timer-btn.start  { background: var(--green); color: #0a1f10; }
  .timer-btn.start:hover { background: #2fb856; }
  .timer-btn.pause  { background: var(--yellow); color: #1a1400; }
  .timer-btn.pause:hover { background: #d4aa30; }
  .timer-btn.reset-t { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
  .timer-btn.reset-t:hover { color: var(--text); border-color: var(--border-strong); }

  .timer-adj { display: flex; align-items: center; gap: 6px; }
  .timer-adj label { font-size: 11px; color: var(--text-dim); letter-spacing: 0.06em; text-transform: uppercase; }
  .adj-btn {
    font-size: 13px; padding: 3px 10px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 5px; color: var(--text-muted); cursor: pointer; font-family: var(--font-body);
    transition: all 0.1s;
  }
  .adj-btn:hover { color: var(--text); border-color: var(--border-strong); }
  .timer-duration-display { font-size: 12px; color: var(--text-dim); min-width: 50px; }

  /* Game list */
  .game-list { display: flex; flex-direction: column; gap: 6px; }
  .section-divider { display: flex; align-items: center; gap: 12px; margin: 1.75rem 0 0.75rem; }
  .section-divider:first-child { margin-top: 0; }
  .phase-tag { font-family: var(--font-display); font-size: 11px; letter-spacing: 0.12em; padding: 3px 9px; border-radius: 4px; text-transform: uppercase; white-space: nowrap; }
  .phase-tag.winners { background: var(--green-dim); color: var(--green); border: 1px solid rgba(62,207,106,0.25); }
  .phase-tag.losers  { background: var(--red-dim); color: var(--red); border: 1px solid rgba(232,50,26,0.25); }
  .phase-tag.final   { background: var(--yellow-dim); color: var(--yellow); border: 1px solid rgba(245,200,66,0.25); }
  .section-title { font-family: var(--font-display); font-size: 17px; letter-spacing: 0.04em; color: var(--text); }
  .section-line { flex: 1; height: 1px; background: var(--border); }

  .match-row { display: flex; align-items: stretch; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; transition: border-color 0.15s; }
  .match-row:hover { border-color: var(--border-strong); }
  .match-row.done { border-color: rgba(62,207,106,0.18); }
  .match-row.upcoming { opacity: 0.45; pointer-events: none; }
  .game-num-col { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 14px; border-right: 1px solid var(--border); min-width: 52px; }
  .game-num-label { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); }
  .game-num-val { font-family: var(--font-display); font-size: 22px; color: var(--text-muted); line-height: 1; }
  .match-row.done .game-num-val { color: var(--green); }
  .teams-col { display: flex; flex-direction: column; flex: 1; }
  .team-btn { display: flex; align-items: center; justify-content: space-between; padding: 11px 14px; background: transparent; border: none; color: var(--text-muted); font-family: var(--font-body); font-size: 14px; cursor: pointer; text-align: left; transition: background 0.12s, color 0.12s; border-bottom: 1px solid var(--border); gap: 8px; width: 100%; }
  .team-btn:last-child { border-bottom: none; }
  .team-btn:hover:not(:disabled) { background: var(--surface2); color: var(--text); }
  .team-btn:disabled { cursor: default; }
  .team-btn.winner { background: var(--green-dim); color: var(--green); font-weight: 600; }
  .team-btn.loser  { color: var(--text-dim); text-decoration: line-through; }
  .tbd-label { color: var(--text-dim); font-style: italic; font-size: 13px; }
  .win-check { font-size: 11px; color: var(--green); opacity: 0; }
  .team-btn.winner .win-check { opacity: 1; }
  .meta-col { display: flex; flex-direction: column; align-items: flex-end; justify-content: space-between; padding: 8px 10px; border-left: 1px solid var(--border); min-width: 80px; gap: 4px; }
  .bracket-tag { font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; padding: 2px 6px; border-radius: 3px; white-space: nowrap; }
  .bracket-tag.w { background: var(--green-dim); color: var(--green); }
  .bracket-tag.l { background: var(--red-dim); color: var(--red); }
  .bracket-tag.f { background: var(--yellow-dim); color: var(--yellow); }
  .undo-btn { font-size: 10px; background: transparent; border: none; color: var(--text-dim); cursor: pointer; transition: color 0.12s; padding: 2px 0; display: none; font-family: var(--font-body); }
  .undo-btn:hover { color: var(--red); }
  .match-row.done .undo-btn { display: block; }

  /* Champion */
  .champion-banner { background: linear-gradient(135deg, #1a1400, #2a1f00); border: 1px solid rgba(245,200,66,0.4); border-radius: 12px; padding: 2rem; text-align: center; margin-top: 2rem; display: none; }
  .champion-banner.visible { display: block; animation: fadeIn 0.4s ease; }
  .champ-label { font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(245,200,66,0.6); margin-bottom: 6px; }
  .champ-name { font-family: var(--font-display); font-size: clamp(36px,8vw,64px); color: var(--yellow); letter-spacing: 0.05em; line-height: 1; }
  .champ-sub { font-size: 13px; color: var(--text-muted); margin-top: 8px; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .hidden { display: none !important; }
  .tournament-area { display: none; }
  .tournament-area.visible { display: block; }
  .top-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem; }
  .reset-note { font-size: 11px; color: var(--text-dim); padding: 10px 12px; background: var(--surface); border-radius: 6px; border: 1px solid var(--border); border-left: 2px solid var(--yellow); margin-top: 1rem; }

  /* ── STANDINGS TABLE ── */
  .standings-widget {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    z-index: 100;
    width: 260px;
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.55), 0 2px 8px rgba(0,0,0,0.3);
    transition: opacity 0.2s, transform 0.2s;
    animation: slideUp 0.35s ease both;
  }
  @keyframes slideUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

  .standings-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 12px 8px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .standings-title {
    font-family: var(--font-display); font-size: 14px; letter-spacing: 0.1em;
    color: var(--text); display: flex; align-items: center; gap: 7px;
  }
  .standings-title-icon { color: var(--yellow); font-size: 13px; }
  .standings-toggle {
    font-size: 10px; color: var(--text-dim); background: none; border: none;
    cursor: pointer; font-family: var(--font-body); padding: 2px 4px;
    transition: color 0.12s; letter-spacing: 0.05em;
  }
  .standings-toggle:hover { color: var(--text-muted); }

  .standings-body { padding: 6px 0; }
  .standings-body.collapsed { display: none; }

  .standings-table { width: 100%; border-collapse: collapse; }
  .standings-table th {
    font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-dim); padding: 4px 12px; text-align: left; font-weight: 500;
  }
  .standings-table th.num-col { text-align: right; padding-right: 10px; }
  .standings-table td { padding: 5px 12px; font-size: 13px; }
  .standings-table td.num-col { text-align: right; padding-right: 10px; color: var(--text-muted); font-size: 12px; }
  .standings-table tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  .standings-table tbody tr:last-child { border-bottom: none; }
  .standings-table tbody tr:hover { background: var(--surface2); }

  .rank-cell { display: flex; align-items: center; gap: 8px; }
  .rank-num {
    font-family: var(--font-display); font-size: 16px; line-height: 1;
    min-width: 18px; text-align: center;
  }
  .rank-1 { color: var(--yellow); }
  .rank-2 { color: #C0C0C0; }
  .rank-3 { color: #CD7F32; }
  .rank-other { color: var(--text-dim); }

  .team-name-cell { font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px; }
  .status-dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
  }
  .status-dot.active   { background: var(--green); box-shadow: 0 0 4px var(--green); }
  .status-dot.one-loss { background: var(--yellow); }
  .status-dot.eliminated { background: var(--red); }
  .status-dot.champion { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }

  .standings-footer {
    padding: 7px 12px 8px;
    border-top: 1px solid var(--border);
    background: rgba(0,0,0,0.2);
  }
  .standings-legend { display: flex; gap: 10px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--text-dim); }

  .standings-widget.minimized .standings-body,
  .standings-widget.minimized .standings-footer { display: none; }
  .standings-widget.minimized { width: auto; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo-block">
      <h1>DODGE<span>BALL</span></h1>
      <p>Double elimination bracket</p>
    </div>
    <div class="stats-bar" id="stats-bar" style="display:none">
      <div class="stat"><div class="stat-val" id="val-played">0</div><div class="stat-lbl">Played</div></div>
      <div class="stat"><div class="stat-val" id="val-left">0</div><div class="stat-lbl">Left</div></div>
    </div>
  </header>

  <!-- Setup -->
  <div class="setup-panel" id="setup-panel">
    <h2>Tournament Setup</h2>

    <div class="setup-section-label">Team names</div>
    <div class="team-inputs" id="team-inputs"></div>

    <div class="setup-section-label">Game timer</div>
    <div class="timer-setup-row">
      <label>Duration:</label>
      <div class="timer-presets">
        <button class="preset-btn" onclick="setPreset(3)">3 min</button>
        <button class="preset-btn active" onclick="setPreset(5)">5 min</button>
        <button class="preset-btn" onclick="setPreset(7)">7 min</button>
        <button class="preset-btn" onclick="setPreset(10)">10 min</button>
      </div>
      <label>or custom:</label>
      <input type="number" id="custom-mins" min="1" max="60" placeholder="min" style="width:70px" oninput="setCustom(this.value)">
    </div>

    <button class="btn-start" onclick="startTournament()">Generate Bracket</button>
  </div>

  <!-- Tournament -->
  <div class="tournament-area" id="tournament-area">
    <div class="top-bar">
      <button class="btn-reset" onclick="resetTournament()">&#8592; New tournament</button>
    </div>

    <!-- Timer -->
    <div class="timer-panel">
      <div id="timer-display" class="timer-display">00:00</div>
      <div class="timer-controls">
        <div class="timer-btn-row">
          <button class="timer-btn start" id="btn-startstop" onclick="timerStartStop()">Start</button>
          <button class="timer-btn reset-t" onclick="timerReset()">Reset</button>
        </div>
        <div class="timer-adj">
          <label>Duration:</label>
          <button class="adj-btn" onclick="adjustDuration(-60)">−1m</button>
          <button class="adj-btn" onclick="adjustDuration(60)">+1m</button>
          <button class="adj-btn" onclick="adjustDuration(-30)">−30s</button>
          <button class="adj-btn" onclick="adjustDuration(30)">+30s</button>
          <span class="timer-duration-display" id="duration-display"></span>
        </div>
      </div>
    </div>

    <div class="game-list" id="game-list"></div>

    <div class="champion-banner" id="champion-banner">
      <div class="champ-label">Tournament Champion</div>
      <div class="champ-name" id="champ-name"></div>
      <div class="champ-sub" id="champ-sub"></div>
    </div>
  </div>
</div>

<!-- ── STANDINGS WIDGET ── -->
<div class="standings-widget hidden" id="standings-widget">
  <div class="standings-header">
    <div class="standings-title">
      <span class="standings-title-icon">◈</span>
      STANDINGS
    </div>
    <button class="standings-toggle" id="standings-toggle-btn" onclick="toggleStandings()">HIDE</button>
  </div>
  <div class="standings-body" id="standings-body">
    <table class="standings-table">
      <thead>
        <tr>
          <th style="width:36px">#</th>
          <th>Team</th>
          <th class="num-col">W</th>
          <th class="num-col">L</th>
          <th class="num-col">GP</th>
        </tr>
      </thead>
      <tbody id="standings-tbody"></tbody>
    </table>
  </div>
  <div class="standings-footer" id="standings-footer">
    <div class="standings-legend">
      <div class="legend-item"><span class="status-dot active"></span> In bracket</div>
      <div class="legend-item"><span class="status-dot one-loss"></span> 1 loss</div>
      <div class="legend-item"><span class="status-dot eliminated"></span> Eliminated</div>
    </div>
  </div>
</div>

<script>
// ── TIMER STATE ──
let timerDuration = 5 * 60;
let timerRemaining = timerDuration;
let timerInterval = null;
let timerRunning = false;

function setPreset(mins) {
  timerDuration = mins * 60;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('custom-mins').value = '';
}

function setCustom(val) {
  const mins = parseInt(val);
  if (!isNaN(mins) && mins > 0) {
    timerDuration = mins * 60;
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  }
}

function fmtTime(s) {
  const m = Math.floor(Math.abs(s) / 60);
  const sec = Math.abs(s) % 60;
  const sign = s < 0 ? '-' : '';
  return sign + String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
}

function updateTimerDisplay() {
  const el = document.getElementById('timer-display');
  el.textContent = fmtTime(timerRemaining);
  el.className = 'timer-display';
  if (timerRemaining < 0) el.classList.add('expired');
  else if (timerRemaining <= 30 && timerRunning) el.classList.add('warning');
  else if (timerRunning) el.classList.add('running');
}

function timerStartStop() {
  const btn = document.getElementById('btn-startstop');
  if (timerRunning) {
    clearInterval(timerInterval);
    timerRunning = false;
    btn.textContent = 'Resume';
    btn.className = 'timer-btn start';
  } else {
    timerRunning = true;
    btn.textContent = 'Pause';
    btn.className = 'timer-btn pause';
    timerInterval = setInterval(() => {
      timerRemaining--;
      updateTimerDisplay();
    }, 1000);
  }
  updateTimerDisplay();
}

function timerReset() {
  clearInterval(timerInterval);
  timerRunning = false;
  timerRemaining = timerDuration;
  document.getElementById('btn-startstop').textContent = 'Start';
  document.getElementById('btn-startstop').className = 'timer-btn start';
  updateTimerDisplay();
}

function adjustDuration(secs) {
  if (timerRunning) return;
  timerDuration = Math.max(60, timerDuration + secs);
  timerRemaining = timerDuration;
  updateDurationDisplay();
  updateTimerDisplay();
}

function updateDurationDisplay() {
  document.getElementById('duration-display').textContent = fmtTime(timerDuration);
}

// ── STANDINGS WIDGET ──
let standingsCollapsed = false;

function toggleStandings() {
  standingsCollapsed = !standingsCollapsed;
  document.getElementById('standings-body').classList.toggle('collapsed', standingsCollapsed);
  document.getElementById('standings-footer').style.display = standingsCollapsed ? 'none' : '';
  document.getElementById('standings-toggle-btn').textContent = standingsCollapsed ? 'SHOW' : 'HIDE';
}

function computeStandings() {
  if (!teams.length) return [];

  // Per-team stats
  const stats = {};
  teams.forEach(t => { stats[t] = { wins: 0, losses: 0, gp: 0, eliminated: false, champion: false }; });

  const allMatchIds = ['wr1_1','wr1_2','wr1_3','lr1_1','wr2_1','wf_1','lr2_1','lr2_2','lf_1','gf_1','gf_reset'];
  allMatchIds.forEach(id => {
    const m = M[id];
    if (!m || !m.winner) return;
    stats[m.winner].wins++;
    stats[m.winner].gp++;
    if (m.loser) {
      stats[m.loser].losses++;
      stats[m.loser].gp++;
    }
  });

  // Determine eliminations: a team with 2 losses is eliminated (double elim)
  teams.forEach(t => {
    if (stats[t].losses >= 2) stats[t].eliminated = true;
  });

  // Champion
  const champ = getChampion();
  if (champ) stats[champ.name] && (stats[champ.name].champion = true);

  // Sort: champion first, then by wins desc, then losses asc, then gp desc
  const sorted = [...teams].sort((a, b) => {
    const sa = stats[a], sb = stats[b];
    if (sa.champion && !sb.champion) return -1;
    if (!sa.champion && sb.champion) return 1;
    if (sa.eliminated !== sb.eliminated) return sa.eliminated ? 1 : -1;
    if (sb.wins !== sa.wins) return sb.wins - sa.wins;
    if (sa.losses !== sb.losses) return sa.losses - sb.losses;
    return sb.gp - sa.gp;
  });

  return sorted.map((t, i) => ({ rank: i + 1, name: t, ...stats[t] }));
}

function renderStandings() {
  const tbody = document.getElementById('standings-tbody');
  const rows = computeStandings();
  tbody.innerHTML = '';
  rows.forEach(r => {
    const rankCls = r.rank === 1 ? 'rank-1' : r.rank === 2 ? 'rank-2' : r.rank === 3 ? 'rank-3' : 'rank-other';
    const dotCls = r.champion ? 'champion' : r.eliminated ? 'eliminated' : r.losses === 1 ? 'one-loss' : 'active';
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>
        <div class="rank-cell">
          <span class="rank-num ${rankCls}">${r.rank}</span>
          <span class="status-dot ${dotCls}"></span>
        </div>
      </td>
      <td><span class="team-name-cell" title="${r.name}">${r.name}</span></td>
      <td class="num-col">${r.wins}</td>
      <td class="num-col">${r.losses}</td>
      <td class="num-col">${r.gp}</td>
    `;
    tbody.appendChild(tr);
  });
}

// ── BRACKET STATE ──
let teams = [];
let M = {};

const SCHEDULE = [
  { sectionBefore: { tag:'Winners', cls:'winners', title:'Round 1 — Winners bracket' } },
  { matchId: 'wr1_1' }, { matchId: 'wr1_2' }, { matchId: 'wr1_3' },
  { sectionBefore: { tag:'Losers', cls:'losers', title:'Round 1 — Losers bracket' } },
  { matchId: 'lr1_1' },
  { sectionBefore: { tag:'Winners', cls:'winners', title:'Round 2 — Winners semifinals' } },
  { matchId: 'wr2_1' },
  { sectionBefore: { tag:'Winners', cls:'winners', title:'Winners final' } },
  { matchId: 'wf_1' },
  { sectionBefore: { tag:'Losers', cls:'losers', title:'Round 2a — Losers bracket' } },
  { matchId: 'lr2_1' },
  { sectionBefore: { tag:'Losers', cls:'losers', title:'Round 2b — Losers bracket' } },
  { matchId: 'lr2_2' },
  { sectionBefore: { tag:'Losers', cls:'losers', title:'Losers final' } },
  { matchId: 'lf_1' },
  { sectionBefore: { tag:'Grand Final', cls:'final', title:'Grand final — Championship' } },
  { matchId: 'gf_1' },
  { matchId: 'gf_reset', conditional: true },
];

function buildTeamInputs() {
  const c = document.getElementById('team-inputs');
  c.innerHTML = '';
  for (let i = 1; i <= 6; i++) {
    const row = document.createElement('div');
    row.className = 'team-input-row';
    row.innerHTML = `<span class="team-num">${i}</span><input type="text" id="ti-${i}" placeholder="Team ${i}" maxlength="20">`;
    c.appendChild(row);
  }
}

function startTournament() {
  teams = [];
  for (let i = 1; i <= 6; i++) {
    const v = document.getElementById(`ti-${i}`).value.trim();
    teams.push(v || `Team ${i}`);
  }
  initMatches();
  propagate();
  document.getElementById('setup-panel').classList.add('hidden');
  document.getElementById('tournament-area').classList.add('visible');
  document.getElementById('stats-bar').style.display = '';
  document.getElementById('standings-widget').classList.remove('hidden');
  timerRemaining = timerDuration;
  timerRunning = false;
  clearInterval(timerInterval);
  document.getElementById('btn-startstop').textContent = 'Start';
  document.getElementById('btn-startstop').className = 'timer-btn start';
  updateTimerDisplay();
  updateDurationDisplay();
  render();
}

function resetTournament() {
  clearInterval(timerInterval);
  timerRunning = false;
  document.getElementById('setup-panel').classList.remove('hidden');
  document.getElementById('tournament-area').classList.remove('visible');
  document.getElementById('stats-bar').style.display = 'none';
  document.getElementById('champion-banner').classList.remove('visible');
  document.getElementById('standings-widget').classList.add('hidden');
  M = {};
  teams = [];
  buildTeamInputs();
}

function initMatches() {
  const s = [...teams].sort(() => Math.random() - 0.5);
  let g = 1;
  function mk(id, a, b, bt, bc) {
    return { id, label:`Game ${g++}`, teamA:a||null, teamB:b||null, winner:null, loser:null, bracketTag:bt, bracketCls:bc };
  }
  M = {
    wr1_1: mk('wr1_1', s[0],s[1],'Winners','w'), wr1_2: mk('wr1_2', s[2],s[3],'Winners','w'), wr1_3: mk('wr1_3', s[4],s[5],'Winners','w'),
    lr1_1: mk('lr1_1', null,null,'Losers','l'),
    wr2_1: mk('wr2_1', null,null,'Winners','w'), wf_1: mk('wf_1', null,null,'Winners','w'),
    lr2_1: mk('lr2_1', null,null,'Losers','l'), lr2_2: mk('lr2_2', null,null,'Losers','l'),
    lf_1:  mk('lf_1',  null,null,'Losers','l'),
    gf_1:  mk('gf_1',  null,null,'Final','f'), gf_reset: mk('gf_reset', null,null,'Reset','f'),
  };
}

function propagate() {
  const m = M;
  if (m.wr1_1.loser && m.wr1_2.loser && !m.lr1_1.teamA) { m.lr1_1.teamA=m.wr1_1.loser; m.lr1_1.teamB=m.wr1_2.loser; }
  if (m.wr1_1.winner && m.wr1_2.winner && !m.wr2_1.teamA) { m.wr2_1.teamA=m.wr1_1.winner; m.wr2_1.teamB=m.wr1_2.winner; }
  if (m.wr1_3.winner && m.wr2_1.winner && !m.wf_1.teamA) { m.wf_1.teamA=m.wr1_3.winner; m.wf_1.teamB=m.wr2_1.winner; }
  if (m.lr1_1.winner && m.wr2_1.loser && !m.lr2_1.teamA) { m.lr2_1.teamA=m.lr1_1.winner; m.lr2_1.teamB=m.wr2_1.loser; }
  if (m.wr1_3.loser && m.wf_1.loser && !m.lr2_2.teamA) { m.lr2_2.teamA=m.wr1_3.loser; m.lr2_2.teamB=m.wf_1.loser; }
  if (m.lr2_1.winner && m.lr2_2.winner && !m.lf_1.teamA) { m.lf_1.teamA=m.lr2_1.winner; m.lf_1.teamB=m.lr2_2.winner; }
  if (m.wf_1.winner && m.lf_1.winner && !m.gf_1.teamA) { m.gf_1.teamA=m.wf_1.winner; m.gf_1.teamB=m.lf_1.winner; }
  if (m.gf_1.winner && m.gf_1.winner===m.lf_1.winner && !m.gf_reset.teamA) { m.gf_reset.teamA=m.gf_1.winner; m.gf_reset.teamB=m.gf_1.loser; }
}

const DEPS = {
  wr1_1:['wr2_1','lr1_1'], wr1_2:['wr2_1','lr1_1'], wr1_3:['wf_1','lr2_2'],
  wr2_1:['wf_1','lr2_1'], wf_1:['gf_1','lr2_2'], lr1_1:['lr2_1'],
  lr2_1:['lf_1'], lr2_2:['lf_1'], lf_1:['gf_1'], gf_1:['gf_reset'], gf_reset:[]
};

function resetDownstream(startId) {
  const visited = new Set();
  function cascade(id) {
    if (visited.has(id)) return; visited.add(id);
    const match = M[id]; match.winner=null; match.loser=null;
    if (id!==startId) { match.teamA=null; match.teamB=null; }
    (DEPS[id]||[]).forEach(cascade);
  }
  cascade(startId);
}

function setWinner(matchId, team) {
  const m = M[matchId];
  if (m.winner || !team) return;
  m.winner=team; m.loser=team===m.teamA?m.teamB:m.teamA;
  propagate(); render();
}

function undoMatch(matchId) { resetDownstream(matchId); propagate(); render(); }

function getChampion() {
  if (M.gf_reset && M.gf_reset.winner) return { name:M.gf_reset.winner, note:'Came back through the losers bracket to claim the title' };
  if (M.gf_1 && M.gf_1.winner && M.wf_1 && M.gf_1.winner===M.wf_1.winner) return { name:M.gf_1.winner, note:'Undefeated throughout the entire tournament' };
  return null;
}

function makeMatchRow(matchId) {
  const m = M[matchId];
  if (!m) return null;
  const ready = m.teamA && m.teamB, done = !!m.winner;
  const row = document.createElement('div');
  row.className = 'match-row'+(done?' done':!ready?' upcoming':'');
  const clsA = m.winner?(m.winner===m.teamA?'winner':'loser'):'';
  const clsB = m.winner?(m.winner===m.teamB?'winner':'loser'):'';
  const dis = (!ready||done)?'disabled':'';
  const safeA=(m.teamA||'').replace(/'/g,"\\'"), safeB=(m.teamB||'').replace(/'/g,"\\'");
  const lblA=m.teamA?m.teamA:'<span class="tbd-label">TBD</span>';
  const lblB=m.teamB?m.teamB:'<span class="tbd-label">TBD</span>';
  row.innerHTML=`
    <div class="game-num-col"><span class="game-num-label">Game</span><span class="game-num-val">${m.label.replace('Game ','')}</span></div>
    <div class="teams-col">
      <button class="team-btn ${clsA}" ${dis} onclick="setWinner('${matchId}','${safeA}')"><span>${lblA}</span><span class="win-check">✓</span></button>
      <button class="team-btn ${clsB}" ${dis} onclick="setWinner('${matchId}','${safeB}')"><span>${lblB}</span><span class="win-check">✓</span></button>
    </div>
    <div class="meta-col"><span class="bracket-tag ${m.bracketCls}">${m.bracketTag}</span><button class="undo-btn" onclick="undoMatch('${matchId}')">↩ undo</button></div>
  `;
  return row;
}

function render() {
  propagate();
  const list = document.getElementById('game-list');
  list.innerHTML = '';
  const showReset = M.gf_1&&M.gf_1.winner&&M.lf_1&&M.gf_1.winner===M.lf_1.winner;
  SCHEDULE.forEach(entry => {
    if (entry.conditional && !showReset) return;
    if (entry.sectionBefore) {
      const s = entry.sectionBefore;
      const div = document.createElement('div');
      div.className = 'section-divider';
      div.innerHTML = `<span class="phase-tag ${s.cls}">${s.tag}</span><span class="section-title">${s.title}</span><span class="section-line"></span>`;
      list.appendChild(div);
    }
    if (entry.matchId) { const row = makeMatchRow(entry.matchId); if(row) list.appendChild(row); }
  });
  if (showReset) {
    const note = document.createElement('p');
    note.className = 'reset-note';
    note.textContent = 'Reset game triggered — the losers finalist won the grand final. Both teams have one loss each — play one more to decide the champion.';
    list.appendChild(note);
  }
  const champ = getChampion();
  const banner = document.getElementById('champion-banner');
  if (champ) { banner.classList.add('visible'); document.getElementById('champ-name').textContent=champ.name; document.getElementById('champ-sub').textContent=champ.note; }
  else banner.classList.remove('visible');
  const all = ['wr1_1','wr1_2','wr1_3','lr1_1','wr2_1','wf_1','lr2_1','lr2_2','lf_1','gf_1'];
  if (showReset) all.push('gf_reset');
  let played=0; all.forEach(id=>{if(M[id]&&M[id].winner)played++;});
  document.getElementById('val-played').textContent=played;
  document.getElementById('val-left').textContent=all.length-played;

  // update standings
  renderStandings();
}

buildTeamInputs();
</script>
